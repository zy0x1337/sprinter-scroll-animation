<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 110" width="180" height="110">
  <!-- Sofa base -->
  <rect x="10" y="60" width="160" height="40" rx="8" fill="#6b5a8a" stroke="#4a3d6a" stroke-width="1.5"/>
  <!-- Seat cushion left -->
  <rect x="14" y="38" width="68" height="34" rx="8" fill="#7d6a9e" stroke="#5a4d7a" stroke-width="1.5"/>
  <!-- Seat cushion right -->
  <rect x="98" y="38" width="68" height="34" rx="8" fill="#7d6a9e" stroke="#5a4d7a" stroke-width="1.5"/>
  <!-- Back left -->
  <rect x="14" y="14" width="68" height="28" rx="8" fill="#8e7baf" stroke="#5a4d7a" stroke-width="1.5"/>
  <!-- Back right -->
  <rect x="98" y="14" width="68" height="28" rx="8" fill="#8e7baf" stroke="#5a4d7a" stroke-width="1.5"/>
  <!-- Left armrest -->
  <rect x="4" y="28" width="16" height="50" rx="8" fill="#6b5a8a" stroke="#4a3d6a" stroke-width="1.5"/>
  <!-- Right armrest -->
  <rect x="160" y="28" width="16" height="50" rx="8" fill="#6b5a8a" stroke="#4a3d6a" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="20" y="96" width="10" height="12" rx="2" fill="#3a2e4a"/>
  <rect x="75" y="96" width="10" height="12" rx="2" fill="#3a2e4a"/>
  <rect x="95" y="96" width="10" height="12" rx="2" fill="#3a2e4a"/>
  <rect x="150" y="96" width="10" height="12" rx="2" fill="#3a2e4a"/>
  <!-- Cushion highlights -->
  <rect x="18" y="42" width="58" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="102" y="42" width="58" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
</svg>