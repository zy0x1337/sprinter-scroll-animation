name: Extract Frames

on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/*.zip'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract frames ZIP
        run: |
          cd assets
          unzip -o ezgif-48ede6340ce173a1-jpg.zip
          rm ezgif-48ede6340ce173a1-jpg.zip

      - name: Commit frames
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.jpg
          git diff --staged --quiet || git commit -m "ci: extract frames from ZIP"
          git push
