<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <!-- TV body -->
  <rect x="6" y="6" width="108" height="70" rx="8" fill="#1a1a1e" stroke="#333338" stroke-width="2"/>
  <!-- Screen -->
  <rect x="12" y="12" width="96" height="58" rx="5" fill="#0d1a2e"/>
  <!-- Screen gradient content -->
  <defs>
    <linearGradient id="tvscreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a6a"/>
      <stop offset="40%" stop-color="#0a2040"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
  </defs>
  <rect x="14" y="14" width="92" height="54" rx="4" fill="url(#tvscreen)"/>
  <!-- Screen reflection -->
  <path d="M16,16 L60,16 L40,35 L16,35 Z" fill="rgba(255,255,255,0.04)"/>
  <!-- Screen highlights -->
  <rect x="20" y="24" width="30" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="20" y="32" width="50" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="20" y="38" width="40" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <!-- Power LED -->
  <circle cx="108" cy="70" r="2" fill="#40ff80" opacity="0.9"/>
  <!-- Stand neck -->
  <rect x="52" y="76" width="16" height="12" rx="2" fill="#2a2a30" stroke="#333338" stroke-width="1"/>
  <!-- Stand base -->
  <rect x="34" y="86" width="52" height="8" rx="4" fill="#1a1a20" stroke="#333338" stroke-width="1.5"/>
  <!-- Brand badge -->
  <rect x="44" y="68" width="32" height="6" rx="2" fill="#222228"/>
  <text x="60" y="73" font-family="Arial,sans-serif" font-size="4" fill="#888890" text-anchor="middle" font-weight="bold">SCREEN</text>
</svg>