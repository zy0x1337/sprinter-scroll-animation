<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprinter Scroll Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="scroll-stage">
    <div class="sticky-canvas">

      <!-- Van -->
      <img class="van-base"
           src="assets/17e48e3f-601d-48ab-9cdb-7b3872942227.png"
           alt="Weißer Sprinter Transporter"
           width="700" height="303" loading="eager" />

      <!-- Flying items -->
      <img class="item" id="item-box"
           src="assets/ffd86333-6f20-4506-8271-2efcbda20c1b.png"
           alt="Umzugskarton" />
      <img class="item" id="item-sofa"
           src="assets/d9764f57-70de-47d4-a7d7-39e5ba5cf440.png"
           alt="Sofa" />
      <img class="item" id="item-lamp"
           src="assets/09d7fb8b-149d-4d3d-9e33-9b06fec8a980.png"
           alt="Stehlampe" />
      <img class="item" id="item-chair"
           src="assets/7f84feaa-de48-4f8d-86a0-93c2c361b6ca.png"
           alt="Stuhl" />
      <img class="item" id="item-shelf"
           src="assets/58f32273-3297-4f56-86c9-6925b1aab724.png"
           alt="Regal" />
      <img class="item" id="item-tv"
           src="assets/14ab99e7-9ea5-412e-b452-ceb1ae9e204a.png"
           alt="Fernseher" />

      <!-- Scroll hint -->
      <div class="scroll-hint" id="scrollHint">
        <span class="scroll-hint-arrow">&#x2193;</span>
        <span class="scroll-hint-label">Scrollen</span>
      </div>

      <!-- Progress bar -->
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    </div>
  </section>

  <section class="outro">
    <h2>Fertig! Alles eingeladen. 🚐</h2>
    <p>Professionelle Entrümpelung – schnell, sauber, zuverlässig.</p>
  </section>

  <script src="animation.js"></script>
</body>
</html>
